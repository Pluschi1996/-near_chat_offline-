workflows:
  android-build:
    name: NearChat Offline APK Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: 1. Fehlenden Android-Ordner erzeugen & Berechtigungen freischalten
        script: |
          # 1. Unsere main.dart in Sicherheit bringen
          mv lib/main.dart ./main.dart.bak
          
          # 2. Android-Gerüst generieren
          flutter create --platforms=android --org com.nearchat .
          
          # 3. Unsere main.dart wieder einsetzen
          mv ./main.dart.bak lib/main.dart
          
          # 4. Der Geheimtrick: Wir schleusen die Internet-Erlaubnis in die Android-Konfiguration ein
          perl -pi -e 's|<application|<uses-permission android:name="android.permission.INTERNET" />\n    <application|' android/app/src/main/AndroidManifest.xml
      - name: 2. Abhängigkeiten installieren
        script: |
          flutter pub get
      - name: 3. APK kompilieren
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      
